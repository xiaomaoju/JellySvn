name: JellySvnHelper
options:
  bundleIdPrefix: com.jellysvn
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: L22GNGMAG4

targets:
  JellySvnHelper:
    type: application
    platform: macOS
    sources:
      - path: JellySvnHelper
        type: group
        excludes:
          - "*.entitlements"
    info:
      path: JellySvnHelper/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: JellySvn Helper
        NSHumanReadableCopyright: "Copyright 2026 JellySvn. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jellysvn.helper
        INFOPLIST_FILE: JellySvnHelper/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        CODE_SIGN_ENTITLEMENTS: JellySvnHelper/JellySvnHelper.entitlements
    dependencies:
      - target: JellySvnFinder
        embed: true

  JellySvnFinder:
    type: app-extension
    platform: macOS
    sources:
      - path: JellySvnFinder
        type: group
        excludes:
          - "*.entitlements"
    info:
      path: JellySvnFinder/Info.plist
      properties:
        CFBundleDisplayName: JellySvn Finder
        CFBundlePackageType: "XPC!"
        NSHumanReadableCopyright: "Copyright 2026 JellySvn. All rights reserved."
        NSPrincipalClass: NSApplication
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).FinderSync"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jellysvn.helper.finder-extension
        INFOPLIST_FILE: JellySvnFinder/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: true
        CODE_SIGN_ENTITLEMENTS: JellySvnFinder/JellySvnFinder.entitlements
    frameworks:
      - FinderSync.framework
